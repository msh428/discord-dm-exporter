<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Discord DM Exporter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-brand">
    <svg class="logo" viewBox="0 0 24 24" width="22" height="22">
      <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z" fill="#5865F2"/>
    </svg>
    <span class="brand-name">DM Exporter</span>
  </div>
  <div id="status-chip" class="status-chip loading">확인 중</div>
</div>

<div class="content">

  <!-- ① DM 목록 섹션 -->
  <div id="section-dm" class="section">
    <div class="search-row">
      <div class="search-box">
        <svg viewBox="0 0 20 20" width="15" height="15" class="search-icon">
          <path d="M8.5 3a5.5 5.5 0 1 0 3.17 9.938l3.444 3.445a.75.75 0 1 0 1.06-1.06L12.73 11.88A5.5 5.5 0 0 0 8.5 3zm-4 5.5a4 4 0 1 1 8 0 4 4 0 0 1-8 0z" fill="currentColor"/>
        </svg>
        <input id="dm-search" type="text" placeholder="상대방 검색..." autocomplete="off" spellcheck="false">
      </div>
      <button id="multiselect-btn" class="btn-chip">다중선택</button>
    </div>
    <div id="dm-list" class="dm-list">
      <div class="dm-placeholder">
        <div class="spinner"></div>
        <span>불러오는 중...</span>
      </div>
    </div>
  </div>

  <!-- ② 내보내기 설정 섹션 -->
  <div id="section-export" class="section hidden">

    <!-- 단일 선택 칩 -->
    <div id="selected-chip" class="selected-chip">
      <img id="sel-avatar" class="chip-avatar" src="" alt="">
      <div class="chip-info">
        <span id="sel-name" class="chip-name"></span>
        <span id="sel-since" class="chip-since"></span>
      </div>
      <button id="btn-deselect" class="chip-remove" title="다시 선택">
        <svg viewBox="0 0 12 12" width="10" height="10">
          <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- 다중 선택 카운트 -->
    <div id="selected-count" class="selected-count hidden">
      <span id="sel-count-text" class="sel-count-text">0개 선택됨</span>
      <button id="btn-clear-all" class="btn-text-sm">모두 해제</button>
    </div>

    <div class="field">
      <div class="field-label">
        날짜 범위
        <label class="toggle-wrap">
          <input type="checkbox" id="date-toggle">
          <span class="toggle-label">범위 지정</span>
        </label>
      </div>
      <div id="date-range-row" class="date-row hidden">
        <input type="date" id="date-from" class="date-input" title="시작일">
        <span class="date-sep">—</span>
        <input type="date" id="date-to" class="date-input" title="종료일">
      </div>
      <div id="date-all-label" class="date-all-label">전체 기간</div>
    </div>

    <div class="field">
      <div class="field-label">내보내기 형식</div>
      <div class="formats">
        <label class="fmt-item">
          <input type="checkbox" value="html" checked>
          <div class="fmt-box"><span class="fmt-name">HTML</span><span class="fmt-sub">뷰어</span></div>
        </label>
        <label class="fmt-item">
          <input type="checkbox" value="json">
          <div class="fmt-box"><span class="fmt-name">JSON</span><span class="fmt-sub">원본</span></div>
        </label>
        <label class="fmt-item">
          <input type="checkbox" value="csv">
          <div class="fmt-box"><span class="fmt-name">CSV</span><span class="fmt-sub">엑셀</span></div>
        </label>
        <label class="fmt-item">
          <input type="checkbox" value="txt">
          <div class="fmt-box"><span class="fmt-name">TXT</span><span class="fmt-sub">텍스트</span></div>
        </label>
      </div>
    </div>

    <button id="export-btn" class="btn-export">
      <svg viewBox="0 0 20 20" width="15" height="15">
        <path d="M10 2a.75.75 0 0 1 .75.75v8.69l2.47-2.47a.75.75 0 1 1 1.06 1.06l-3.75 3.75a.75.75 0 0 1-1.06 0L5.72 10.03a.75.75 0 0 1 1.06-1.06l2.47 2.47V2.75A.75.75 0 0 1 10 2zM3.25 15a.75.75 0 0 0 0 1.5h13.5a.75.75 0 0 0 0-1.5H3.25z" fill="currentColor"/>
      </svg>
      내보내기
    </button>
  </div>

  <!-- ③ 진행 섹션 -->
  <div id="section-progress" class="section hidden">
    <div id="batch-status" class="batch-status hidden"></div>
    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <div class="progress-row">
        <span id="progress-text" class="progress-text">준비 중...</span>
        <span id="elapsed-time" class="elapsed-time">00:00</span>
        <button id="cancel-btn" class="btn-cancel">취소</button>
      </div>
    </div>
  </div>

  <!-- 에러 -->
  <div id="error-box" class="error-box hidden"></div>

</div>

<!-- 푸터 -->
<div class="footer">
  <div class="donate-links">
    <a href="https://ko-fi.com/YOUR_ID" target="_blank" class="donate-link" title="Ko-fi로 후원">☕</a>
    <button id="crypto-btn" class="donate-link donate-btn" title="암호화폐로 후원">₿</button>
  </div>
  <span class="ver">v1.2.0</span>
</div>

<!-- 암호화폐 모달 -->
<div id="crypto-modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-title">암호화폐 후원</div>
    <div class="wallet-item">
      <span class="wallet-label">Bitcoin (BTC)</span>
      <div class="wallet-addr-row">
        <span class="wallet-addr" id="addr-btc">14Uq8XazKZcuBWJRirEhNovMAcw6RogJ34</span>
        <button class="copy-btn" data-target="addr-btc">복사</button>
      </div>
    </div>
    <div class="wallet-item">
      <span class="wallet-label">Ethereum · USDT (ERC-20)</span>
      <div class="wallet-addr-row">
        <span class="wallet-addr" id="addr-eth">0x0efe630005b7ebc3d97d6bdfecda7cfce5facc58</span>
        <button class="copy-btn" data-target="addr-eth">복사</button>
      </div>
    </div>
    <button id="modal-close" class="modal-close">닫기</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
