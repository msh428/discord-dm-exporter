<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord DM Exporter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <svg class="logo" viewBox="0 0 24 24" fill="none">
      <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z" fill="#5865F2"/>
    </svg>
    <div class="header-text">
      <h1>DM Exporter</h1>
      <div id="status" class="status status-disconnected">Discord 탭을 열어주세요</div>
    </div>
  </div>

  <div class="body">
    <div class="field">
      <label for="user-input">상대방 유저명 또는 유저 ID</label>
      <input id="user-input" type="text" placeholder="username 또는 123456789012345678" autocomplete="off" spellcheck="false">
    </div>

    <div class="field">
      <label>내보내기 형식</label>
      <div class="formats">
        <label class="format-item">
          <input type="checkbox" value="html" checked>
          <span class="format-label">HTML</span>
          <span class="format-desc">보기 좋은 웹페이지</span>
        </label>
        <label class="format-item">
          <input type="checkbox" value="json">
          <span class="format-label">JSON</span>
          <span class="format-desc">원본 데이터</span>
        </label>
        <label class="format-item">
          <input type="checkbox" value="csv">
          <span class="format-label">CSV</span>
          <span class="format-desc">엑셀용</span>
        </label>
        <label class="format-item">
          <input type="checkbox" value="txt">
          <span class="format-label">TXT</span>
          <span class="format-desc">텍스트</span>
        </label>
      </div>
    </div>

    <button id="export-btn" disabled>내보내기</button>

    <div id="progress" class="progress hidden">
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <div id="progress-text" class="progress-text">준비 중...</div>
    </div>

    <div id="error" class="error hidden"></div>
  </div>

  <div class="footer">
    <a id="kofi-link" href="https://ko-fi.com/" target="_blank" class="kofi-btn">
      ☕ 후원하기
    </a>
    <span class="version">v1.0.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
